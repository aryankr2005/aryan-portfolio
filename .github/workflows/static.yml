# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment. Cancel any in-progress run so the
# latest push always wins and new deployments are never blocked.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: List build output (debug)
        run: find dist -maxdepth 2 | sort
      - name: Copy index.html to 404.html for SPA routing
        run: |
          if [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
            echo "PAGES_DIR=dist/client" >> $GITHUB_ENV
          elif [ -f dist/index.html ]; then
            cp dist/index.html dist/404.html
            echo "PAGES_DIR=dist" >> $GITHUB_ENV
          else
            echo "No index.html found in dist or dist/client" && exit 1
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
